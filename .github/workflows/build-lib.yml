name: Build and Release Library

on:
  push:
    tags:
      - 'v*' # Startet, wenn du ein Release-Tag erstellst (z. B. v4.1.3)

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build für Linux (Ubuntu)
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Kompiliere statische Bibliothek (.a)
          set -e
          SOURCES="noise.c biomes.c layers.c biomenoise.c generator.c finders.c util.c quadbase.c"
          gcc -c -O3 -fPIC $SOURCES
          ar rcs libcubiomes.a *.o
          
          # Kompiliere dynamische Bibliothek (.so)
          gcc -shared -o libcubiomes.so -fPIC *.o -lm
          
          # Packe die Bibliotheken zusammen mit den Header-Dateien (.h) ein
          tar -czvf cubiomes-linux.tar.gz libcubiomes.a libcubiomes.so *.h

      # Build für Windows (MSVC)
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if %errorlevel% neq 0 exit /b %errorlevel%
          set SOURCES_C=noise.c biomes.c layers.c biomenoise.c generator.c finders.c util.c quadbase.c
          
          REM Kompiliere die Objektdateien
          cl /c /O2 %SOURCES_C%
          if %errorlevel% neq 0 exit /b %errorlevel%
          
          REM Erstelle die statische Bibliothek (.lib)
          lib /OUT:libcubiomes.lib *.obj
          if %errorlevel% neq 0 exit /b %errorlevel%
          
          REM Erstelle die dynamische Bibliothek (.dll)
          link /DLL /OUT:libcubiomes.dll *.obj
          if %errorlevel% neq 0 exit /b %errorlevel%
          
          REM Zippe die Dateien zusammen mit den Header-Dateien (.h)
          powershell "Compress-Archive -Path libcubiomes.lib, libcubiomes.dll, *.h -DestinationPath cubiomes-windows.zip"

      # Automatisches Hochladen in das GitHub-Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cubiomes-linux.tar.gz
            cubiomes-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
